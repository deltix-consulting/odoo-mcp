name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      # All third-party actions pinned to a full commit SHA. Tag in
      # the comment is what we resolved at pin-time. Bump via
      # dependabot or:
      #   gh api repos/<org>/<repo>/git/refs/tags/<tag> --jq .object.sha
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src/odoo_mcp

      - name: Pytest
        run: uv run pytest -q

      - name: Build package
        run: uv build

      - name: Generate build provenance attestation
        # Hard-fail: attestation is the trust anchor for the release.
        # A failed attestation here means the release does not publish.
        # If it fails for a transient reason (GitHub API hiccup), delete
        # the tag, push it again, and the workflow re-runs cleanly.
        # The repo is public (attestations require either public OR a
        # paid org); if you make the repo private again this step will
        # fail and that is intentional.
        uses: actions/attest-build-provenance@92c65d2898f1f53cfdc910b962cecff86e7f8fcc  # v1
        with:
          subject-path: 'dist/*'

      - name: Extract changelog section
        id: changelog
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: uv run python scripts/extract_changelog.py "$GITHUB_REF_NAME" CHANGELOG.md release_notes.md

      - name: Detect prerelease
        id: prerelease
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
